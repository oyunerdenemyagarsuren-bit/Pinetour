<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <link rel="stylesheet" href="border.css" />
  <body>
    <div
      style="
        background-color: rgb(87, 188, 231);
        height: 500px;
        width: 800px;
        border: 5px blue solid;
        padding: 50px;
      "
    >
      <div
        style="
          background-color: rgb(221, 179, 102);
          height: 300px;
          width: 500px;
          border: 5px solid yellow;
          padding: 50px;
        "
      >
        <div
          style="
            height: 200px;
            width: 300px;
            background-color: rgb(220, 144, 214);
            border: 5px dashed red;
          "
        ></div>
      </div>
    </div>
  </body>
</html>
